<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Itch.io Jam Stats</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <meta
    name="description"
    content="load itch.io jam entries from a jam url, slug, or numeric jam id"
  >
  <meta name="jam-stats-api-base" content="">
  <script>
    (function () {
      try {
        document.documentElement.dataset.theme =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f2f2;
      --panel: #ffffff;
      --header: #f7f7f7;
      --line: #d8d8d8;
      --line-dark: #aaaaaa;
      --fg: #222222;
      --muted: #858585;
      --link: #fa5c5c;
      --link-hover: #e14f4f;
      --visited: #c44e5f;
      --active-fill: #ffe0e0;
      --table-hover: #fff0f0;
      --danger: #a00000;
      --success: #2f6c2f;
      --button-bg: #f7f7f7;
      --button-bg-hover: #ececec;
      --button-text: #222222;
      --button-highlight: #ffffff;
      --button-shadow: #aaaaaa;
      --disabled-bg: #efefef;
      --disabled-fg: #7d7d7d;
      --row-even: #fcfcfc;
      --code-bg: #fff3f3;
      --code-fg: #434343;
      --summary-fg: #434343;
      --platform-bg: #fafafa;
      --platform-fg: #444444;
      --maxw: 1180px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111317;
      --panel: #1a1d22;
      --header: #20242a;
      --line: #353a42;
      --line-dark: #4a4f58;
      --fg: #f3f3f3;
      --muted: #b3b3b3;
      --link: #fa5c5c;
      --link-hover: #ff7a7a;
      --visited: #ff9ea6;
      --active-fill: #46262a;
      --table-hover: #262b33;
      --danger: #ff9a9a;
      --success: #8fd28a;
      --button-bg: #252930;
      --button-bg-hover: #2d323a;
      --button-text: #f3f3f3;
      --button-highlight: #3a4049;
      --button-shadow: #0c0d10;
      --disabled-bg: #1a1d22;
      --disabled-fg: #7a7f86;
      --row-even: #15181d;
      --code-bg: #2a1c1f;
      --code-fg: #f0d2d2;
      --summary-fg: #d8d8d8;
      --platform-bg: #20242a;
      --platform-fg: #dadada;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      background: var(--bg);
      color: var(--fg);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    a {
      color: var(--link);
      text-decoration: underline;
    }

    a:hover {
      color: var(--link-hover);
    }

    a:visited {
      color: var(--visited);
    }

    button,
    input {
      font: inherit;
    }

    main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 16px 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--header);
    }
    
    .brand {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    
    .page-logo {
      width: 52px;
      height: 52px;
      background: transparent;
      object-fit: cover;
      flex: 0 0 auto;
    }
    
    .brand-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 52px;
    }
    
    .brand-copy h1 {
      margin: 0;
      font-family: inherit;
      font-size: 31px;
      line-height: 1;
      font-weight: 400;
    }

    .panel {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    
    .brand-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1 1 360px;
      min-width: 240px;
      width: 100%;
      padding: 7px 8px;
      border: 1px solid var(--line-dark);
      border-radius: 0;
      background: var(--panel);
      color: var(--fg);
    }

    input[type="text"]:disabled {
      background: var(--disabled-bg);
      color: var(--disabled-fg);
    }

    button {
      padding: 7px 10px;
      border: 1px solid;
      border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight);
      border-radius: 0;
      background: var(--button-bg);
      color: var(--button-text);
      cursor: pointer;
    }

    button.ghost {
      background: var(--panel);
    }

    button:hover:not(:disabled) {
      background: var(--button-bg-hover);
    }

    button:active:not(:disabled) {
      border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow);
    }

    button:disabled {
      color: var(--disabled-fg);
      cursor: not-allowed;
    }

    .status {
      min-height: 20px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dotted var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }

    .search-wrap {
      flex: 1 1 320px;
    }

    .summary {
      padding: 5px 8px;
      border: 1px solid var(--line);
      background: var(--header);
      color: var(--summary-fg);
      white-space: nowrap;
    }

    .table-panel {
      padding: 0;
      overflow: hidden;
    }

    .table-scroll-top {
      display: none;
      overflow-x: auto;
      overflow-y: hidden;
      height: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--header);
    }

    .table-scroll-top.active {
      display: block;
    }

    .table-scroll-spacer {
      height: 1px;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px 10px;
      vertical-align: top;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    th.row-index,
    td.row-index {
      width: 1%;
      white-space: nowrap;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    thead tr {
      background: var(--header);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--header);
    }

    th button.sort {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      margin: 0;
      border: 0;
      background: none;
      color: var(--link);
      text-decoration: underline;
    }

    th button.sort:hover:not(:disabled) {
      background: none;
    }

    th button.sort.active {
      color: var(--visited);
      font-weight: 700;
    }

    .sort-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      color: currentColor;
      opacity: 0.75;
    }

    th button.sort.active .sort-indicator {
      opacity: 1;
    }

    .sort-indicator svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    tbody tr:nth-child(even) {
      background: var(--row-even);
    }

    tbody tr:hover {
      background: var(--table-hover);
    }

    .game-link {
      font-weight: 400;
    }

    .subtle {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .contrib-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .platform-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 24px;
      padding: 0;
      border: 1px solid var(--line-dark);
      background: var(--platform-bg);
      color: var(--platform-fg);
      box-shadow: none;
    }

    .platform-icon.active {
      background: var(--active-fill);
      color: var(--fg);
    }

    .platform-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      font-style: italic;
    }

    code {
      padding: 0 4px;
      border: 1px solid var(--line);
      background: var(--code-bg);
      color: var(--code-fg);
      font-family: "Courier New", Courier, monospace;
      font-size: 0.95em;
    }

    .footer {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
      background: var(--header);
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .footer p {
      margin: 0;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      vertical-align: middle;
    }

    .github-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    @media (max-width: 720px) {
      main {
        padding: 10px 10px 18px;
      }

      .topbar {
        padding: 10px;
      }

      .brand {
        align-items: flex-start;
      }

      .summary {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <img class="page-logo" src="./logo.png" alt="jam-stats logo">
        <div class="brand-copy">
          <h1><a href="https://itch.io" target="_blank" rel="noreferrer">Itch.io</a> Jam Stats</h1>
          <p class="brand-subtitle">
            scrapes public data from
            <a href="https://itch.io" target="_blank" rel="noreferrer">itch.io</a>
            to provide jam stats for a game jam
          </p>
        </div>
      </div>
    </header>
    <section class="panel">
      <label for="jam-input">jam url / slug / id</label>
      <div class="controls">
        <input
          id="jam-input"
          type="text"
          placeholder="https://itch.io/jam/brackeys-15 or brackeys-15 or 402922"
        >
        <button id="load-button" type="button">load entries</button>
        <button id="example-button" class="ghost" type="button">use example</button>
      </div>

      <div id="status" class="status">ready</div>
    </section>

    <section class="toolbar">
      <div class="search-wrap">
        <label for="search-input">search game / contributor</label>
        <input id="search-input" type="text" placeholder="game title or contributor name" disabled>
      </div>
      <div id="summary" class="summary">0 entries</div>
    </section>

    <section class="panel table-panel">
      <div id="table-scroll-top" class="table-scroll-top">
        <div id="table-scroll-spacer" class="table-scroll-spacer" aria-hidden="true"></div>
      </div>
      <div id="table-wrap" class="table-wrap">
        <table id="results-table" aria-describedby="summary">
          <thead id="table-head">
            <tr>
              <th class="row-index">#</th>
              <th><button class="sort" data-sort="gameName" type="button" title="canonical itch.io game title from jam_games[].game.title">game name <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="contributors" type="button" title="uses jam_games[].contributors when present otherwise falls back to the primary uploader">contributors <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort active" data-sort="popularity" type="button" title="uses itch.io native jam_games order from entries.json where 1 is most popular">popularity <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="totalRating" type="button" title="raw rating_count from entries.json">total rating <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="coolness" type="button" title="raw coolness from entries.json calculated by itch as max votes_given minus disqualified_votes across contributors">coolness <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="karma" type="button" title="calculated as log 1 plus coolness minus log 1 plus rating_count divided by log 5">karma <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="platforms" type="button" title="from jam_games[].game.platforms in entries.json">platforms <span class="sort-indicator" aria-hidden="true"></span></button></th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td class="empty" colspan="8">load a jam to populate the table</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <p>
        Shoutout to
        <a href="https://discord.gg/AsQChfzBuF" target="_blank" rel="noreferrer">Jamlytics by Quinten</a>,
        and <a href="https://itchanalytics.vercel.app" target="_blank" rel="noreferrer">ItchAnalytics by Notenlish</a>
        <br>
        <a class="github-link" href="https://github.com/aniketrajnish/itch-jam-stats" target="_blank" rel="noreferrer" aria-label="GitHub repository">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.52 7.52 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
          <span>github</span>
        </a>
      </p>
    </footer>
  </main>

  <script defer src="./app.js?v=20260309-10"></script>
</body>
</html>
